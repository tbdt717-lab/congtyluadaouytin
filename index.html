<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quỹ Chung Online - Công Ty Lừa Đảo Uy Tín</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #e0e5ec; text-align: center; padding: 20px; }
        .jar { width: 120px; height: 200px; border: 4px solid white; border-radius: 10px 10px 30px 30px; margin: 20px auto; position: relative; background: rgba(255,255,255,0.3); overflow: hidden; }
        .btn-group button { padding: 15px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 16px; }
        #history { background: white; max-width: 400px; margin: 20px auto; height: 250px; overflow-y: auto; text-align: left; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .item { border-bottom: 1px solid #eee; padding: 8px; font-size: 14px; }
        .money-note { position: absolute; width: 30px; height: 15px; background: #a5d6a7; border: 1px solid green; animation: fall 0.7s forwards; }
        @keyframes fall { 0% { top: -20px; left: 45px; } 100% { top: 170px; left: 40px; } }
    </style>
</head>
<body>
    <h2>💰 QUỸ CHUNG ONLINE 💰</h2>
    <p><i>Công ty lừa đảo uy tín số 1 thế giới</i></p>
    <h1 id="total-display">0 VNĐ</h1>
    <div class="jar" id="jar"></div>
    <div class="btn-group">
        <button style="background: #4caf50;" onclick="sendMoney(1000)">+1.000đ</button>
        <button style="background: #2196f3;" onclick="sendMoney(5000)">+5.000đ</button>
    </div>
    <div id="history">
        <h4 style="text-align: center; margin: 0 0 10px 0;">Lịch sử đóng góp</h4>
        <div id="list"></div>
    </div>
    <script>
        // Tên người dùng tạm thời
        let myName = localStorage.getItem('user_name') || prompt("Nhập tên của bạn để bắt đầu:") || "Ẩn danh";
        localStorage.setItem('user_name', myName);

        // --- ĐÂY LÀ ĐOẠN BẠN CẦN DÁN MÃ FIREBASE VÀO SAU ---
        // Hiện tại nó sẽ chỉ chạy trên máy bạn cho đến khi bạn dán mã Firebase thật
        let total = 0;
        function sendMoney(amount) {
            total += amount;
            document.getElementById('total-display').innerText = total.toLocaleString() + " VNĐ";
            const list = document.getElementById('list');
            list.innerHTML = `<div class="item"><b>${myName}</b> vừa thả: +${amount.toLocaleString()}đ</div>` + list.innerHTML;
            showEffect();
        }
        function showEffect() {
            const note = document.createElement('div');
            note.className = 'money-note';
            document.getElementById('jar').appendChild(note);
            setTimeout(() => note.remove(), 700);
        }
    </script>
</body>
</html>
