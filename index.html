<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quỹ Chung Bảo Mật - Công Ty Lừa Đảo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e0e5ec; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        /* Màn hình đăng nhập */
        #login-screen { background: white; padding: 30px; border-radius: 20px; box-shadow: 10px 10px 20px #bebebe; text-align: center; width: 320px; }
        .user-slot { margin: 15px 0; padding: 15px; border: 2px dashed #3498db; border-radius: 12px; }
        input { width: 80%; margin: 5px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: #3498db; color: white; padding: 10px 20px; width: 90%; }
        .btn-main:hover { background: #2980b9; }

        /* Giao diện chính */
        #game-interface { display: none; width: 90%; max-width: 800px; gap: 20px; flex-direction: row; }
        .main-panel { background: white; padding: 25px; border-radius: 20px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); flex: 1; text-align: center; }
        #history-panel { background: #f9f9f9; padding: 15px; border-radius: 15px; width: 280px; height: 400px; overflow-y: auto; text-align: left; border-left: 4px solid #3498db; }
        
        .balance { font-size: 30px; font-weight: bold; color: #27ae60; margin: 15px 0; }
        .jar { width: 100px; height: 180px; border: 4px solid #333; border-radius: 10px 10px 30px 30px; margin: 20px auto; position: relative; background: rgba(255,255,255,0.5); overflow: hidden; }
        
        .money-note { position: absolute; width: 30px; height: 15px; background: #2ecc71; border: 1px solid #27ae60; animation: fall 0.6s forwards; }
        @keyframes fall { 0% { top: -20px; left: 40px; } 100% { top: 150px; left: 35px; } }
        
        .history-item { font-size: 13px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .history-item b { color: #2980b9; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h3>🔐 ĐĂNG NHẬP QUỸ</h3>
        <div id="user-slots"></div>
    </div>

    <div id="game-interface">
        <div class="main-panel">
            <p id="welcome-txt" style="font-weight: bold; color: #7f8c8d;"></p>
            <div class="balance">Tổng: <span id="total-val">0</span>đ</div>
            <div class="jar" id="jar"></div>
            <div style="display:flex; justify-content:center; gap:10px;">
                <button onclick="addMoney(1000)" style="background:#2ecc71; color:white; padding:15px 20px;">+1k</button>
                <button onclick="addMoney(5000)" style="background:#3498db; color:white; padding:15px 20px;">+5k</button>
            </div>
            <br>
            <button onclick="location.reload()" style="background:#95a5a6; color:white; padding:8px 15px;">Đăng xuất</button>
        </div>

        <div id="history-panel">
            <h4 style="text-align:center; margin-top:0;">📝 LỊCH SỬ</h4>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        // Dữ liệu mẫu (Khi dùng Firebase sẽ thay đoạn này)
        let data = JSON.parse(localStorage.getItem('myJarData')) || {
            users: [null, null, null],
            balance: 0,
            history: []
        };
        let activeUser = null;

        function renderLogin() {
            const container = document.getElementById('user-slots');
            container.innerHTML = '';
            for(let i=0; i<3; i++) {
                const u = data.users[i];
                const div = document.createElement('div');
                div.className = 'user-slot';
                if(u) {
                    div.innerHTML = `<b>${u.name}</b><br><input type="password" id="p${i}" placeholder="Mật khẩu"><br><button class="btn-main" onclick="login(${i})">Vào hũ</button>`;
                } else {
                    div.innerHTML = `<i>Slot Trống</i><br><input type="text" id="n${i}" placeholder="Tên"><br><input type="password" id="pw${i}" placeholder="Mật khẩu"><br><button class="btn-main" onclick="register(${i})">Tạo tài khoản</button>`;
                }
                container.appendChild(div);
            }
        }

        function register(i) {
            const name = document.getElementById(`n${i}`).value;
            const pass = document.getElementById(`pw${i}`).value;
            if(!name || !pass) return alert("Nhập đủ tên & pass nha!");
            data.users[i] = { name, pass };
            save(); renderLogin();
        }

        function login(i) {
            const inputPass = document.getElementById(`p${i}`).value;
            if(inputPass === data.users[i].pass) {
                activeUser = data.users[i].name;
                startApp();
            } else { alert("Sai pass rồi chủ tịch ơi!"); }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-interface').style.display = 'flex';
            document.getElementById('welcome-txt').innerText = "Chủ tịch: " + activeUser;
            updateUI();
        }

        function addMoney(amt) {
            data.balance += amt;
            data.history.unshift({ name: activeUser, amount: amt, time: new Date().toLocaleTimeString() });
            if(data.history.length > 20) data.history.pop();
            save(); updateUI(); dropEffect();
        }

        function updateUI() {
            document.getElementById('total-val').innerText = data.balance.toLocaleString();
            const hList = document.getElementById('history-list');
            hList.innerHTML = '';
            data.history.forEach(h => {
                hList.innerHTML += `<div class="history-item"><b>${h.name}</b>: +${h.amount}đ <small>(${h.time})</small></div>`;
            });
        }

        function dropEffect() {
            const n = document.createElement('div'); n.className = 'money-note';
            document.getElementById('jar').appendChild(n);
            setTimeout(() => n.remove(), 600);
        }

        function save() { localStorage.setItem('myJarData', JSON.stringify(data)); }
        renderLogin();
    </script>
</body>
</html>
